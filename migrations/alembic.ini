# Обычная конфигурация для одной базы данных.

[alembic]
# шаблон, по которому генерируются файлы миграций
# file_template = %%(rev)s_%%(slug)s

# поставь 'true', чтобы окружение запускалось
# при команде 'revision' независимо от autogenerate
# revision_environment = false


# Настройка логирования
[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
